<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Projetos</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f3; color: #1a1a1a; font-size: 15px; }
  .header { background: #1a1a1a; color: #fff; padding: 20px 24px; }
  .header h1 { font-size: 20px; font-weight: 500; }
  .header p { font-size: 13px; color: #888; margin-top: 2px; }
  .controls { padding: 16px 24px; background: #fff; border-bottom: 1px solid #e8e8e6; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .search-wrap { position: relative; flex: 1; min-width: 220px; }
  .search-wrap input { width: 100%; padding: 9px 12px 9px 36px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; background: #fafaf9; }
  .search-wrap input:focus { border-color: #666; background: #fff; }
  .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: #aaa; }
  select { padding: 9px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; background: #fafaf9; outline: none; cursor: pointer; }
  .stats { display: flex; gap: 8px; padding: 16px 24px; flex-wrap: wrap; }
  .stats-group { display: flex; flex-direction: column; gap: 4px; }
  .stats-label { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; padding: 0 2px; }
  .stats-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .stat { background: #fff; border: 1px solid #e8e8e6; border-radius: 10px; padding: 12px 16px; min-width: 110px; cursor: pointer; transition: border-color .15s; }
  .stat:hover { border-color: #999; }
  .stat.active { border-color: #1a1a1a; box-shadow: 0 0 0 1px #1a1a1a; }
  .stat .num { font-size: 24px; font-weight: 500; }
  .stat .lbl { font-size: 12px; color: #888; margin-top: 2px; }
  .table-wrap { padding: 0 24px 24px; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 12px; overflow: hidden; border: 1px solid #e8e8e6; }
  thead { background: #f5f5f3; }
  th { padding: 11px 14px; text-align: left; font-size: 12px; font-weight: 500; color: #666; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #e8e8e6; white-space: nowrap; cursor: pointer; user-select: none; }
  th:hover { color: #1a1a1a; }
  td { padding: 11px 14px; border-bottom: 1px solid #f0f0ee; font-size: 14px; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafaf9; }
  tr.row-obra td { background: #fff8f0; }
  tr.row-obra:hover td { background: #fff0e0; }
  tr.row-naoinst td { background: #f0f7ff; }
  tr.row-naoinst:hover td { background: #e4f0ff; }
  .proto { font-family: monospace; font-size: 13px; color: #666; }
  .cliente { font-weight: 500; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; white-space: nowrap; }
  .b-aprovado   { background: #e6f4ea; color: #1e7e34; }
  .b-aprovadoar { background: #d4edda; color: #155724; }
  .b-emanalise  { background: #fff3cd; color: #856404; }
  .b-reprovado  { background: #f8d7da; color: #721c24; }
  .b-cancelado  { background: #f0f0ee; color: #888; }
  .b-semstatus  { background: #f0f0ee; color: #aaa; }
  .b-obra       { background: #ff8c00; color: #fff; font-weight: 700; }
  .b-naoinst    { background: #cce5ff; color: #004085; }
  .b-outro      { background: #f0e6ff; color: #5a3e8e; }
  .no-results   { text-align: center; padding: 48px; color: #aaa; font-size: 14px; }
  .count-bar    { padding: 8px 24px; font-size: 13px; color: #888; }
  @media (max-width: 600px) {
    .controls { flex-direction: column; }
    .stats-row { gap: 6px; }
    .stat { flex: 1; min-width: 80px; }
    th, td { padding: 9px 10px; font-size: 13px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Painel de Projetos</h1>
  <p id="update-time"></p>
</div>

<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">&#128269;</span>
    <input type="text" id="search" placeholder="Buscar por protocolo, cliente, inversor..." oninput="render()">
  </div>
  <select id="filter-projeto" onchange="render()">
    <option value="">Projeto: Todos</option>
  </select>
  <select id="filter-vistoria" onchange="render()">
    <option value="">Vistoria: Todos</option>
  </select>
  <select id="filter-marca" onchange="render()">
    <option value="">Marca: Todas</option>
  </select>
</div>

<div class="stats">
  <div class="stats-group">
    <div class="stats-label">Geral</div>
    <div class="stats-row">
      <div class="stat active" id="card-total" onclick="setCardFilter('total')">
        <div class="num" id="s-total">—</div><div class="lbl">Total</div>
      </div>
      <div class="stat" id="card-obra" onclick="setCardFilter('obra')">
        <div class="num" id="s-obra" style="color:#ff8c00">—</div><div class="lbl">Em Obra</div>
      </div>
      <div class="stat" id="card-naoinst" onclick="setCardFilter('naoinst')">
        <div class="num" id="s-naoinst" style="color:#004085">—</div><div class="lbl">Não Instalado</div>
      </div>
    </div>
  </div>

  <div class="stats-group">
    <div class="stats-label">Projeto</div>
    <div class="stats-row">
      <div class="stat" id="card-aprovado" onclick="setCardFilter('aprovado')">
        <div class="num" id="s-aprovado" style="color:#1e7e34">—</div><div class="lbl">Aprovados</div>
      </div>
      <div class="stat" id="card-analise" onclick="setCardFilter('analise')">
        <div class="num" id="s-analise" style="color:#856404">—</div><div class="lbl">Em Análise</div>
      </div>
      <div class="stat" id="card-reprovado" onclick="setCardFilter('reprovado')">
        <div class="num" id="s-reprovado" style="color:#721c24">—</div><div class="lbl">Reprovados</div>
      </div>
    </div>
  </div>

  <div class="stats-group">
    <div class="stats-label">Vistoria</div>
    <div class="stats-row">
      <div class="stat" id="card-v-analise" onclick="setCardFilter('v-analise')">
        <div class="num" id="s-v-analise" style="color:#856404">—</div><div class="lbl">Em Análise</div>
      </div>
      <div class="stat" id="card-v-reprovado" onclick="setCardFilter('v-reprovado')">
        <div class="num" id="s-v-reprovado" style="color:#721c24">—</div><div class="lbl">Reprovados</div>
      </div>
    </div>
  </div>
</div>

<div class="count-bar" id="count-bar"></div>

<div class="table-wrap">
<table>
  <thead>
    <tr>
      <th onclick="sortBy('protocolo')">Protocolo <span id="sort-protocolo"></span></th>
      <th onclick="sortBy('cliente')">Cliente <span id="sort-cliente"></span></th>
      <th onclick="sortBy('projeto')">Projeto <span id="sort-projeto"></span></th>
      <th onclick="sortBy('vistoria')">Vistoria <span id="sort-vistoria"></span></th>
      <th onclick="sortBy('inversores')">Inversores <span id="sort-inversores"></span></th>
      <th onclick="sortBy('marca')">Marca <span id="sort-marca"></span></th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>
</div>

function badgeClass(v) {
  const s = (v||'').toLowerCase().replace(/\s+/g,'').normalize('NFD').replace(/[\u0300-\u036f]/g,'');

  projs.forEach(v  => { const o = document.createElement('option'); o.value = v; o.textContent = v||'—'; fp.appendChild(o); });
  const fv = document.getElementById('filter-vistoria');
  vists.forEach(v  => { const o = document.createElement('option'); o.value = v; o.textContent = v||'—'; fv.appendChild(o); });
  const fm = document.getElementById('filter-marca');
  marcas.forEach(v => { const o = document.createElement('option'); o.value = v; o.textContent = v; fm.appendChild(o); });
}

function setCardFilter(card) {
  activeCard = activeCard === card ? 'total' : card;
  document.querySelectorAll('.stat').forEach(el => el.classList.remove('active'));
  document.getElementById('card-' + activeCard).classList.add('active');
  render();
}

function sortBy(col) {
  if (sortCol === col) sortDir *= -1; else { sortCol = col; sortDir = 1; }
  ['protocolo','cliente','projeto','vistoria','inversores','marca'].forEach(c => {
    document.getElementById('sort-'+c).textContent = '';
  });
  document.getElementById('sort-'+col).textContent = sortDir === 1 ? ' ↑' : ' ↓';
  render();
}

function render() {
  const q  = document.getElementById('search').value.toLowerCase();
  const fp = document.getElementById('filter-projeto').value;
  const fv = document.getElementById('filter-vistoria').value;
  const fm = document.getElementById('filter-marca').value;

  let rows = DATA.filter(r => {
    if (activeCard === 'aprovado'    && !(r.projeto === 'Aprovado' || r.projeto === 'Aprovado AR')) return false;
    if (activeCard === 'analise'     && r.projeto !== 'Em Análise') return false;
    if (activeCard === 'reprovado'   && r.projeto !== 'Reprovado')  return false;
    if (activeCard === 'obra'        && !isObra(r))    return false;
    if (activeCard === 'naoinst'     && !isNaoInst(r)) return false;
    if (activeCard === 'v-analise'   && r.vistoria !== 'Em Análise') return false;
    if (activeCard === 'v-reprovado' && r.vistoria !== 'Reprovado')  return false;
    if (fp && r.projeto  !== fp) return false;
    if (fv && r.vistoria !== fv) return false;
    if (fm && r.marca    !== fm) return false;
    if (q) {
      const hay = (r.protocolo + r.cliente + r.inversores + r.marca).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  rows.sort((a, b) => {
    const av = (a[sortCol]||'').toString().toLowerCase();
    const bv = (b[sortCol]||'').toString().toLowerCase();
    return av < bv ? -sortDir : av > bv ? sortDir : 0;
  });

  document.getElementById('s-total').textContent      = DATA.length;
  document.getElementById('s-aprovado').textContent   = DATA.filter(r => r.projeto === 'Aprovado' || r.projeto === 'Aprovado AR').length;
  document.getElementById('s-analise').textContent    = DATA.filter(r => r.projeto === 'Em Análise').length;
  document.getElementById('s-reprovado').textContent  = DATA.filter(r => r.projeto === 'Reprovado').length;
  document.getElementById('s-obra').textContent       = DATA.filter(isObra).length;
  document.getElementById('s-naoinst').textContent    = DATA.filter(isNaoInst).length;
  document.getElementById('s-v-analise').textContent  = DATA.filter(r => r.vistoria === 'Em Análise').length;
  document.getElementById('s-v-reprovado').textContent= DATA.filter(r => r.vistoria === 'Reprovado').length;
  document.getElementById('count-bar').textContent    = 'Exibindo ' + rows.length + ' de ' + DATA.length + ' registros';

  const tbody = document.getElementById('tbody');
  if (rows.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" class="no-results">Nenhum resultado encontrado</td></tr>';
    return;
  }

  tbody.innerHTML = rows.map(r => {
    const obra    = isObra(r);
    const naoinst = isNaoInst(r);
    const cls     = obra ? 'row-obra' : naoinst ? 'row-naoinst' : '';
    return '<tr class="' + cls + '">' +
      '<td class="proto">' + r.protocolo + '</td>' +
      '<td class="cliente">' + r.cliente + '</td>' +
      '<td>' + badge(r.projeto, false) + '</td>' +
      '<td>' + badge(r.vistoria, naoinst) + '</td>' +
      '<td>' + (r.inversores||'—') + '</td>' +
      '<td>' + (r.marca||'—') + '</td>' +
      '</tr>';
  }).join('');
}

document.getElementById('update-time').textContent = 'Atualizado em: ' + UPDATE_TIME;
populate_filters();
sortBy('cliente');
</script>
</body>
